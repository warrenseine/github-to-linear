<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub PR → Linear Review — Options</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        padding: 16px;
        min-width: 320px;
        color: #1f2328;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 14px;
        border: 1px solid #d1d9e0;
        border-radius: 6px;
      }
      .hint {
        color: #59636e;
        font-size: 12px;
        margin-top: 6px;
      }
      button {
        margin-top: 12px;
        padding: 6px 14px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        background: #1f883d;
        color: #fff;
        cursor: pointer;
      }
      #status {
        margin-left: 8px;
        color: #1a7f37;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <label for="workspace">Linear workspace slug</label>
    <input id="workspace" type="text" placeholder="hey-pearl" />
    <p class="hint">
      The part after linear.app/ in your Linear URLs, e.g.
      <code>hey-pearl</code> for linear.app/hey-pearl/reviews.
    </p>
    <button id="save">Save</button><span id="status"></span>
    <script src="options.js"></script>
  </body>
</html>
